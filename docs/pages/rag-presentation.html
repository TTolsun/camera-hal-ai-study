document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

--surface-card: var(--navy-800);\n  --surface-card-hover: var(--navy-750);\n  --surface-inset: var(--navy-700);\n\n  --text-strong: var(--ink-50);\n  --text-body: var(--ink-100);\n  --text-secondary: var(--ink-200);\n  --text-muted: var(--ink-300);\n  --text-faint: var(--ink-400);\n  --text-on-accent: var(--navy-950);\n\n  --border-hairline: rgba(255, 255, 255, 0.07);\n  --border-soft: rgba(255, 255, 255, 0.12);\n  --border-strong: var(--navy-500);\n\n  /* knowledge-map roles */\n  --edge: var(--teal-400);            /* connections between concepts */\n  --edge-soft: var(--teal-600);\n  --node: var(--amber-400);           /* knowledge nodes */\n  --node-soft: var(--amber-600);\n  --warn: var(--red-400);             /* caution / pitfall */\n  --ok: var(--green-400);             /* correct / after */\n\n  --accent: var(--teal-400);          /* default interactive accent */\n  --focus-ring: var(--teal-400);\n}\n<\u002Fstyle>\n  <style>/* ============================================================\n   TYPOGRAPHY — LLM Wiki Design System\n   Pretendard for Korean/Latin text; JetBrains Mono for technical\n   labels, node IDs, and code. Type scale tuned for slides\n   (1280×720 → 1920×1080) and dense reference cards.\n   ============================================================ */\n:root {\n  /* ---- Families ---- */\n  --font-sans: \"Pretendard\", -apple-system, BlinkMacSystemFont,\n               \"Apple SD Gothic Neo\", \"Noto Sans KR\", system-ui, sans-serif;\n  --font-mono: \"JetBrains Mono\", \"SFMono-Regular\", \"D2Coding\",\n               ui-monospace, \"Cascadia Code\", monospace;\n\n  /* ---- Weights ---- */\n  --fw-regular: 400;  /* @kind font */\n  --fw-medium: 500;   /* @kind font */\n  --fw-semibold: 600; /* @kind font */\n  --fw-bold: 700;     /* @kind font */\n  --fw-extrabold: 800;/* @kind font */\n\n  /* ---- Type scale (px-based; rem fallback friendly) ---- */\n  --fs-display: 64px;   /* slide hero title */\n  --fs-h1: 44px;        /* slide title */  600; /* @kind font */\n  --fw-bold: 700;     /* @kind font */\n  --fw-extrabold: 800;/* @kind font */\n\n  /* ---- Type scale (px-based; rem fallback friendly) ---- */\n  --fs-display: 64px;   /* slide hero title */\n  --fs-h1: 44px;        /* slide title */\n  --fs-h2: 32px;        /* section title */\n  --fs-h3: 24px;        /* card title */\n  --fs-h4: 20px;        /* sub-title */\n  --fs-body-lg: 19px;   /* lead paragraph */\n  --fs-body: 17px;      /* body */\n  --fs-body-sm: 15px;   /* dense body */\n  --fs-caption: 13px;   /* captions */\n  --fs-mono-lg: 16px;   /* code block */\n  --fs-mono: 14px;      /* inline mono / labels */\n  --fs-mono-sm: 12px;   /* tiny tech labels (uppercased) */\n\n  /* ---- Line heights ---- */\n  --lh-tight: 1.12;  /* @kind other */\n  --lh-snug: 1.3;    /* @kind other */\n  --lh-body: 1.65;   /* @kind other */\n  --lh-mono: 1.55;   /* @kind other */\n\n  /* ---- Letter spacing ---- */\n  --ls-display: -0.02em;       /* @kind font */\n  --ls-heading: -0.01em;       /* @kind font */\n  --ls-body: 0;                /* @kind font */\n  --ls-mono-label: 0.12em;  /* @kind font */\n}\n\n/* ============================================================\n   SPACING, RADII, SHADOWS, MOTION — LLM Wiki Design System\n   8px base grid. Generous whitespace for technical reading.\n   ============================================================ */\n:root {\n  /* ---- Spacing scale (8px base) ---- */\n  --space-1: 4px;\n  --space-2: 8px;\n  --space-3: 12px;\n  --space-4: 16px;\n  --space-5: 24px;\n  --space-6: 32px;\n  --space-7: 48px;\n  --space-8: 64px;\n  --space-9: 96px;\n  --space-10: 128px;\n\n  /* slide gutters — wide margins are a brand rule */\n  --slide-pad-x: 96px;\n  --slide-pad-y: 72px;\n\n  /* ---- Radii ---- */\n  --radius-xs: 4px;\n  --radius-sm: 8px;\n  --radius-md: 12px;     /* default card */\n  --radius-lg: 18px;     /* large panel */\n  --radius-xl: 28px;\n  --radius-pill: 999px;\n  --radius-node: 14px;   /* knowledge-node card */\n\n  /* ---- Borders ---- */\n  --bw-hair: 1px;\n  --bw-emph: 1.5px;\n  --bw-node: 2px;        /* node outline weight */\n\n  /* ---- Shadows / glows ---- */\n  --shadow-card: 0 1px 0 rgba(255,255,255,0.04) inset,\n                 0 8px 24px rgba(0,0,0,0.45);\n  --shadow-pop: 0 16px 48px rgba(0,0,0,0.55);\n  --glow-edge: 0 0 0 1px var(--teal-glow), 0 0 24px var(--teal-glow);\n  --glow-node: 0 0 0 1px var(--amber-glow), 0 0 28px var(--amber-glow);\n\n  /* ---- Motion ---- */\n  --ease-out: cubic-bezier(0.22, 0.61, 0.36, 1);    /* @kind other */\n  --ease-inout: cubic-bezier(0.65, 0, 0.35, 1);     /* @kind other */\n  --dur-fast: 120ms;   /* @kind other */\n  --dur-base: 220ms;   /* @kind other */\n  --dur-slow: 420ms;   /* @kind other */\n\n  /* ---- Layout ---- */\n  --content-max: 1120px;\n  --z-overlay: 100;   /* @kind other */\n}\n\n/* ============================================================\n   BASE — element defaults for the LLM Wiki Design System.\n   Kept minimal: resets + sensible dark-theme defaults so any\n   page that links styles.css inherits the brand baseline.\n   ============================================================ */\n\n*,\n*::before,\n*::after { box-sizing: border-box; }\n\nhtml { -webkit-text-size-adjust: 100%; }\n\nbody {\n  margin: 0;\n  background: var(--bg-page);\n  color: var(--text-body);\n  font-family: var(--font-sans);\n  font-size: var(--fs-body);\n  line-height: var(--lh-body);\n  letter-spacing: var(--ls-body);\n  font-weight: var(--fw-regular);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n  word-break: keep-all;          /* don't break Korean mid-word */\n  overflow-wrap: anywhere;\n}\n\nh1, h2, h3, h4 {\n  margin: 0;\n  color: var(--text-strong);\n  font-weight: var(--fw-bold);\n  line-height: var(--lh-tight);\n  letter-spacing: var(--ls-heading);\n}\n\np { margin: 0; }\n\na {\n  color: var(--accent);\n  text-decoration: none;\n}\na:hover { color: var(--teal-300); }\n\ncode, pre, kbd, samp {\n  font-family: var(--font-mono);\n}\n\n::selection {\n  background: var(--teal-glow);\n  color: var(--text-strong);\n}\n\n:focus-visible {\n  outline: 2px solid var(--focus-ring);\n  outline-offset: 2px;\n}\n\n/* Reusable: tiny uppercased monospace technical label */\n.ds-mono-label {\n  font-family: var(--font-mono);\n  font-size: var(--fs-mono-sm);\n  font-weight: var(--fw-medium);\n  letter-spacing: var(--ls-mono-label);\n  text-transform: uppercase;\n  color: var(--text-muted);\n}\n\n<\u002Fstyle>\n  <script src=\"8354e714-5fbb-4c41-9279-ba9b3b9fd65c\"><\u002Fscript>\n  <script src=\"45ad0578-4685-4d9f-b79f-1756090f78cb\"><\u002Fscript>\n  <style>\n    html,body{margin:0;background:#05080f;}\n  <\u002Fstyle>\n<\u002Fhelmet>\n<x-import component-from-global-scope=\"deck-stage\" from=\"45ad0578-4685-4d9f-b79f-1756090f78cb#/deck-stage.js\" width=\"1280\" height=\"720\" hint-size=\"100%,100%\">\n\n  <!-- 1 — TITLE -->\n  <section data-label=\"Title\" data-speaker-notes=\"오늘 발표는 RAG를 이론으로 설명하는 자리가 아닙니다. 핵심은 '우리 Camera HAL 코드에 AI를 어떻게 안전하게 쓰는가' 입니다. 딱 하나만 기억하셔도 됩니다 — AI를 믿자는 게 아니라, AI가 근거 없이 말하지 못하게 만들자.\" style=\"width:100%;height:100%;box-sizing:border-box;background:#070A12;background-image:radial-gradient(circle at 1px 1px, rgba(255,255,255,0.045) 1px, transparent 0);background-size:32px 32px;color:#E6EAF2;font-family:'Pretendard',system-ui,sans-serif;display:flex;flex-direction:column;justify-content:center;padding:0 96px;position:relative;\">\n    <span style=\"display:inline-flex;align-items:center;gap:9px;width:fit-content;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.08em;color:#3FD8C7;border:1px solid #15998B;background:rgba(63,216,199,0.06);padding:7px 14px;border-radius:999px;margin-bottom:30px;\">\n      <span style=\"width:7px;height:7px;border-radius:50%;background:#3FD8C7;box-shadow:0 0 8px #3FD8C7;\"><\u002Fspan>Camera HAL Dev Session · 30 min\n    <\u002Fspan>\n    <h1 style=\"margin:0;font-size:64px;line-height:1.12;font-weight:800;letter-spacing:-0.02em;color:#F4F6FA;word-break:keep-all;\">Camera HAL에서<br>RAG는 왜 필요한가<\u002Fh1>\n    <p style=\"margin:22px 0 0;font-size:21px;line-height:1.6;color:#C5CDDC;max-width:680px;word-break:keep-all;\">Claude 같은 AI Agent가 <b style=\"color:#F4F6FA;font-weight:600;\">근거(evidence)를 먼저 찾고<\u002Fb> 일하게 만드는 작업 구조.<\u002Fp>\n    <span style=\"margin-top:44px;font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:0.12em;text-transform:uppercase;color:#4A566B;\">RETRIEVAL · AUGMENTED · GENERATION<\u002Fspan>\n  <\u002Fsection>\n\n  <!-- 2 — AGENDA -->\n  <section data-label=\"Agenda\" data-speaker-notes=\"30분 동안 6개 파트를 봅니다. 가장 시간을 많이 쓰는 곳은 파트 4 — Claude에게 RAG를 강제하는 방법(8분)입니다. 거기가 실무에 바로 쓰는 부분이라 집중해서 봐주세요.\" style=\"width:100%;height:100%;box-sizing:border-box;background:#0A0E18;background-image:radial-gradient(circle at 1px 1px, rgba(255,255,255,0.04) 1px, transparent 0);background-size:30px 30px;color:#E6EAF2;font-family:'Pretendard',system-ui,sans-serif;display:flex;flex-direction:column;padding:56px 96px 44px;position:relative;\">\n    <span style=\"display:inline-flex;align-items:center;gap:10px;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.14em;text-transform:uppercase;color:#3FD8C7;margin-bottom:14px;\"><span style=\"width:22px;height:1.5px;background:#3FD8C7;\"><\u002Fspan>Agenda · 30분 구성<\u002Fspan>\n    <h2 style=\"margin:0 0 26px;font-size:36px;font-weight:700;letter-spacing:-0.015em;color:#F4F6FA;\">오늘 이야기할 순서<\u002Fh2>\n    <div style=\"flex:1;display:flex;flex-direction:column;justify-content:center;gap:2px;\">\n      <div style=\"display:flex;align-items:baseline;gap:20px;padding:13px 0;border-bottom:1px solid rgba(255,255,255,0.08);\"><span style=\"font-family:'JetBrains Mono',monospace;color:#3FD8C7;font-size:14px;width:26px;\">01<\u002Fspan><span style=\"flex:1;font-size:18px;color:#E6EAF2;\">문제 제기 — Camera HAL에 AI를 그냥 쓰면 위험한 이유<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace;color:#4A566B;font-size:13px;\">4 min<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;align-items:baseline;gap:20px;padding:13px 0;border-bottom:1px solid rgba(255,255,255,0.08);\"><span style=\"font-family:'JetBrains Mono',monospace;color:#3FD8C7;font-size:14px;width:26px;\">02<\u002Fspan><span style=\"flex:1;font-size:18px;color:#E6EAF2;\">RAG 기본 개념 — Retrieval-Augmented Generation<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace;color:#4A566B;font-size:13px;\">7 min<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;align-items:baseline;gap:20px;padding:13px 0;border-bottom:1px solid rgba(255,255,255,0.08);\"><span style=\"font-family:'JetBrains Mono',monospace;color:#3FD8C7;font-size:14px;width:26px;\">03<\u002Fspan><span style=\"flex:1;font-size:18px;color:#E6EAF2;\">RAG 동작 구조 — grep · Vector DB · Indexing / Retrieval<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace;color:#4A566B;font-size:13px;\">5 min<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;align-items:baseline;gap:20px;padding:13px 0;border-bottom:1px solid rgba(255,255,255,0.08);background:rgba(245,183,63,0.04);\"><span style=\"font-family:'JetBrains Mono',monospace;color:#F5B73F;font-size:14px;width:26px;\">04<\u002Fspan><span style=\"flex:1;font-size:18px;color:#F4F6FA;font-weight:600;\">Claude Agent에 강제하기 — CLAUDE.md · Skill · Tool · Hook<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace;color:#F5B73F;font-size:13px;\">8 min<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;align-items:baseline;gap:20px;padding:13px 0;border-bottom:1px solid rgba(255,255,255,0.08);\"><span style=\"font-family:'JetBrains Mono',monospace;color:#3FD8C7;font-size:14px;width:26px;\">05<\u002Fspan><span style=\"flex:1;font-size:18px;color:#E6EAF2;\">Camera HAL 적용 — Hybrid RAG · 실전 예시 · 도입 로드맵<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace;color:#4A566B;font-size:13px;\">5 min<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;align-items:baseline;gap:20px;padding:13px 0;\"><span style=\"font-family:'JetBrains Mono',monospace;color:#3FD8C7;font-size:14px;width:26px;\">06<\u002Fspan><span style=\"flex:1;font-size:18px;color:#E6EAF2;\">결론<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace;color:#4A566B;font-size:13px;\">1 min<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 3 — PROBLEM -->\n  <section data-label=\"문제 제기\" data-speaker-notes=\"여기서 청중 공감을 끌어내세요. '한 번이라도 AI가 멀쩡한 코드를 자신있게 틀리게 고친 경험 있으시죠?' 핵심은 LLM이 멍청해서가 아니라, 우리 코드를 안 보고 답했기 때문이라는 점입니다. 이 한 줄이 오늘 발표 전체의 출발점입니다.\" style=\"width:100%;height:100%;box-sizing:border-box;background:#0A0E18;background-image:radial-gradient(circle at 1px 1px, rgba(255,255,255,0.04) 1px, transparent 0);background-size:30px 30px;color:#E6EAF2;font-family:'Pretendard',system-ui,sans-serif;display:flex;flex-direction:column;padding:56px 96px 40px;\">\n    <span style=\"display:inline-flex;align-items:center;gap:10px;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.14em;text-transform:uppercase;color:#3FD8C7;margin-bottom:14px;\"><span style=\"width:22px;height:1.5px;background:#3FD8C7;\"><\u002Fspan>01 · 문제 제기<\u002Fspan>\n    <h2 style=\"margin:0 0 28px;font-size:34px;font-weight:700;letter-spacing:-0.015em;color:#F4F6FA;\">“AI한테 SAT common화 시켜봤더니…”<\u002Fh2>\n    <div style=\"flex:1;display:grid;grid-template-columns:1.15fr 1fr;gap:40px;align-items:center;\">\n      <div>\n        <p style=\"margin:0 0 22px;font-size:19px;line-height:1.6;color:#C5CDDC;word-break:keep-all;\">LLM은 그럴듯하게 답합니다. 문제는 <b style=\"color:#F4F6FA;font-weight:600;\">그 답이 우리 코드를 본 게 아니라는 것<\u002Fb>입니다.<\u002Fp>\n        <div style=\"display:flex;flex-direction:column;gap:14px;\">\n          <div style=\"display:flex;gap:12px;align-items:flex-start;\"><span style=\"color:#3FD8C7;font-size:15px;line-height:1.6;\">▸<\u002Fspan><span style=\"font-size:17px;line-height:1.55;color:#E6EAF2;\">최신 <b style=\"color:#fff;\">branch 코드<\u002Fb>를 모름 — 학습 시점에 멈춰 있음<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;gap:12px;align-items:flex-start;\"><span style=\"color:#3FD8C7;font-size:15px;line-height:1.6;\">▸<\u002Fspan><span style=\"font-size:17px;line-height:1.55;color:#E6EAF2;\"><b style=\"color:#fff;\">vendor / customer rule<\u002Fb>을 모름<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;gap:12px;align-items:flex-start;\"><span style=\"color:#3FD8C7;font-size:15px;line-height:1.6;\">▸<\u002Fspan><span style=\"font-size:17px;line-height:1.55;color:#E6EAF2;\"><b style=\"color:#fff;\">metadata flow<\u002Fb>를 착각할 수 있음<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <x-import component-from-global-scope=\"LLMWikiDesignSystem_3ba8d6.Callout\" tone=\"warn\" title=\"그냥 쓰면 터지는 지점\" hint-size=\"100%,230px\">\n        <div style=\"display:flex;flex-direction:column;gap:9px;margin-top:2px;\">\n          <span style=\"font-size:15px;line-height:1.45;color:#E6EAF2;\">– buffer / fence lifecycle 오해<\u002Fspan>\n          <span style=\"font-size:15px;line-height:1.45;color:#E6EAF2;\">– thread / queue / concurrency 위험<\u002Fspan>\n          <span style=\"font-size:15px;line-height:1.45;color:#E6EAF2;\">– performance hot path 영향<\u002Fspan>\n          <span style=\"font-size:15px;line-height:1.45;color:#E6EAF2;\">– preview · capture · reprocess · multi-camera regression<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fx-import>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;justify-content:space-between;padding-top:14px;\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:#4A566B;\">LLM Wiki · Camera HAL<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#4A566B;\">03 / 21<\u002Fspan><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 4 — WHY DANGEROUS -->\n  <section data-label=\"HAL이 위험한 이유\" data-speaker-notes=\"이 슬라이드는 '왜 우리한테 특히 중요한가'를 박는 곳입니다. HAL은 틀린 답의 비용이 큽니다. 그래서 다른 팀보다 '근거 강제'가 더 절실하다는 흐름으로 다음 RAG 개념으로 넘어가세요.\" style=\"width:100%;height:100%;box-sizing:border-box;background:#0A0E18;background-image:radial-gradient(circle at 1px 1px, rgba(255,255,255,0.04) 1px, transparent 0);background-size:30px 30px;color:#E6EAF2;font-family:'Pretendard',system-ui,sans-serif;display:flex;flex-direction:column;padding:56px 96px 40px;\">\n    <span style=\"display:inline-flex;align-items:center;gap:10px;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.14em;text-transform:uppercase;color:#3FD8C7;margin-bottom:14px;\"><span style=\"width:22px;height:1.5px;background:#3FD8C7;\"><\u002Fspan>01 · 문제 제기<\u002Fspan>\n    <h2 style=\"margin:0 0 18px;font-size:34px;font-weight:700;letter-spacing:-0.015em;color:#F4F6FA;\">왜 Camera HAL은 특히 위험한가<\u002Fh2>\n    <p style=\"margin:0 0 26px;font-size:19px;line-height:1.6;color:#C5CDDC;max-width:760px;word-break:keep-all;\">일반 앱 코드와 다르게, HAL은 한 줄 잘못 고치면 <b style=\"color:#F4F6FA;font-weight:600;\">화면 전체가 멈추거나 capture가 깨집니다.<\u002Fb><\u002Fp>\n    <div style=\"flex:1;display:grid;grid-template-columns:repeat(3,1fr);gap:18px;align-items:center;\">\n      <div style=\"background:#131A2A;border:1px solid rgba(255,255,255,0.12);border-top:3px solid #E5736B;border-radius:12px;padding:22px 22px;box-shadow:0 8px 24px rgba(0,0,0,.45);height:100%;box-sizing:border-box;\"><div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:0.1em;text-transform:uppercase;color:#E5736B;font-weight:700;margin-bottom:12px;\">타이밍 의존<\u002Fdiv><p style=\"margin:0;font-size:15.5px;line-height:1.6;color:#C5CDDC;word-break:keep-all;\">fence · thread · queue가 얽혀 있어 “논리적으로 맞는” 수정이 실제로는 deadlock을 만듦.<\u002Fp><\u002Fdiv>\n      <div style=\"background:#131A2A;border:1px solid rgba(255,255,255,0.12);border-top:3px solid #E5736B;border-radius:12px;padding:22px 22px;box-shadow:0 8px 24px rgba(0,0,0,.45);height:100%;box-sizing:border-box;\"><div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:0.1em;text-transform:uppercase;color:#E5736B;font-weight:700;margin-bottom:12px;\">상태 흐름<\u002Fdiv><p style=\"margin:0;font-size:15.5px;line-height:1.6;color:#C5CDDC;word-break:keep-all;\">request → metadata → buffer 흐름을 한 군데만 봐선 못 잡음. 전체 lifecycle을 알아야 함.<\u002Fp><\u002Fdiv>\n      <div style=\"background:#131A2A;border:1px solid rgba(255,255,255,0.12);border-top:3px solid #E5736B;border-radius:12px;padding:22px 22px;box-shadow:0 8px 24px rgba(0,0,0,.45);height:100%;box-sizing:border-box;\"><div style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:0.1em;text-transform:uppercase;color:#E5736B;font-weight:700;margin-bottom:12px;\">광범위 regression<\u002Fdiv><p style=\"margin:0;font-size:15.5px;line-height:1.6;color:#C5CDDC;word-break:keep-all;\">preview는 멀쩡한데 reprocess · multi-camera에서만 터지는 회귀.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"margin:24px 0 0;font-size:18px;line-height:1.55;color:#3FD8C7;font-weight:500;word-break:keep-all;\">→ 그래서 “AI가 코드를 확인하지 않고는 답하지 못하게” 만드는 장치가 필요합니다.<\u002Fp>\n    <div style=\"display:flex;align-items:center;justify-content:space-between;padding-top:14px;\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:#4A566B;\">LLM Wiki · Camera HAL<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#4A566B;\">04 / 21<\u002Fspan><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 5 — RAG DEFINITION (graph) -->\n  <section data-label=\"RAG 정의\" data-speaker-notes=\"약어를 한 글자씩 풀어주세요. R-A-G. '검색해서 보강해서 생성한다' — 이 리듬으로 외우게 만드세요. 가장 중요한 단어는 '바로 답하지 않고'입니다. 그게 RAG의 전부입니다.\" style=\"width:100%;height:100%;box-sizing:border-box;background:#0A0E18;background-image:radial-gradient(circle at 1px 1px, rgba(255,255,255,0.04) 1px, transparent 0);background-size:30px 30px;color:#E6EAF2;font-family:'Pretendard',system-ui,sans-serif;display:flex;flex-direction:column;padding:56px 96px 40px;\">\n    <span style=\"display:inline-flex;align-items:center;gap:10px;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.14em;text-transform:uppercase;color:#3FD8C7;margin-bottom:14px;\"><span style=\"width:22px;height:1.5px;background:#3FD8C7;\"><\u002Fspan>02 · RAG 기본 개념<\u002Fspan>\n    <h2 style=\"margin:0 0 4px;font-size:34px;font-weight:700;letter-spacing:-0.015em;color:#F4F6FA;\">RAG = Retrieval-Augmented Generation<\u002Fh2>\n    <div style=\"flex:1;display:flex;flex-direction:column;justify-content:center;gap:26px;\">\n      <x-import component-from-global-scope=\"LLMWikiDesignSystem_3ba8d6.GraphCanvas\" nodes=\"{{ ragNodes }}\" edges=\"{{ ragEdges }}\" height=\"240px\" show-grid=\"{{ false }}\" hint-size=\"100%,240px\"><\u002Fx-import>\n      <div style=\"background:color-mix(in srgb, #3FD8C7 7%, #131A2A);border:1px solid rgba(255,255,255,0.12);border-left:3px solid #3FD8C7;border-radius:10px;padding:20px 24px;\">\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:0.1em;text-transform:uppercase;color:#3FD8C7;font-weight:700;\">한 문장 정의<\u002Fspan>\n        <p style=\"margin:8px 0 0;font-size:19px;line-height:1.6;color:#E6EAF2;word-break:keep-all;\">RAG는 LLM이 <b style=\"color:#fff;\">바로 답하지 않고<\u002Fb>, 관련 자료를 <b style=\"color:#3FD8C7;\">먼저 찾아서<\u002Fb> 그 자료를 <b style=\"color:#fff;\">근거로 답하게<\u002Fb> 만드는 구조다.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;justify-content:space-between;padding-top:14px;\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:#4A566B;\">LLM Wiki · Camera HAL<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#4A566B;\">05 / 21<\u002Fspan><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 6 — NO RAG vs RAG (two graphs) -->\n  <section data-label=\"RAG 없음 vs 있음\" data-speaker-notes=\"이 도식이 오늘 발표에서 제일 중요한 그림입니다. 손으로 화살표를 따라가며 설명하세요. '위는 AI가 상상으로 답하는 구조, 아래는 우리 자료를 보고 답하는 구조' — 이 대비 하나만 가져가면 됩니다.\" style=\"width:100%;height:100%;box-sizing:border-box;background:#0A0E18;background-image:radial-gradient(circle at 1px 1px, rgba(255,255,255,0.04) 1px, transparent 0);background-size:30px 30px;color:#E6EAF2;font-family:'Pretendard',system-ui,sans-serif;display:flex;flex-direction:column;padding:56px 96px 40px;\">\n    <span style=\"display:inline-flex;align-items:center;gap:10px;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.14em;text-transform:uppercase;color:#3FD8C7;margin-bottom:14px;\"><span style=\"width:22px;height:1.5px;background:#3FD8C7;\"><\u002Fspan>02 · RAG 기본 개념 · 도식 ①<\u002Fspan>\n    <h2 style=\"margin:0 0 22px;font-size:34px;font-weight:700;letter-spacing:-0.015em;color:#F4F6FA;\">RAG 없음 vs RAG 있음<\u002Fh2>\n    <div style=\"flex:1;display:flex;flex-direction:column;justify-content:center;gap:20px;\">\n      <div>\n        <span style=\"display:inline-flex;align-items:center;gap:6px;padding:3px 11px;border-radius:999px;font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:0.06em;background:color-mix(in srgb,#E5736B 16%,transparent);color:#F2A39A;border:1px solid color-mix(in srgb,#E5736B 32%,transparent);margin-bottom:8px;\">RAG 없음 · 근거 없음<\u002Fspan>\n        <x-import component-from-global-scope=\"LLMWikiDesignSystem_3ba8d6.GraphCanvas\" nodes=\"{{ noRagNodes }}\" edges=\"{{ noRagEdges }}\" height=\"120px\" show-grid=\"{{ false }}\" hint-size=\"100%,120px\"><\u002Fx-import>\n      <\u002Fdiv>\n      <div>\n        <span style=\"display:inline-flex;align-items:center;gap:6px;padding:3px 11px;border-radius:999px;font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:0.06em;background:color-mix(in srgb,#57C98A 16%,transparent);color:#93E2B0;border:1px solid color-mix(in srgb,#57C98A 32%,transparent);margin-bottom:8px;\">RAG 있음 · 근거 기반<\u002Fspan>\n        <x-import component-from-global-scope=\"LLMWikiDesignSystem_3ba8d6.GraphCanvas\" nodes=\"{{ yesRagNodes }}\" edges=\"{{ yesRagEdges }}\" height=\"120px\" show-grid=\"{{ false }}\" hint-size=\"100%,120px\"><\u002Fx-import>\n      <\u002Fdiv>\n      <p style=\"margin:4px 0 0;font-size:18px;line-height:1.55;color:#C5CDDC;word-break:keep-all;\">차이는 단 하나 — <b style=\"color:#3FD8C7;\">LLM 앞에 “검색” 단계가 강제로 들어가느냐<\u002Fb>입니다.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;justify-content:space-between;padding-top:12px;\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:#4A566B;\">LLM Wiki · Camera HAL<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#4A566B;\">06 / 21<\u002Fspan><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 7 — grep vs RAG -->\n  <section data-label=\"grep vs RAG\" data-speaker-notes=\"개발자들이 가장 먼저 던지는 반박입니다. 미리 받아치세요. grep은 '찾기'에서 끝나고, RAG는 '찾은 걸 답에 연결'까지가 한 세트. grep은 RAG의 검색 방식 중 하나가 될 수 있다 — 포함 관계라는 점을 강조하세요.\" style=\"width:100%;height:100%;box-sizing:border-box;background:#0A0E18;background-image:radial-gradient(circle at 1px 1px, rgba(255,255,255,0.04) 1px, transparent 0);background-size:30px 30px;color:#E6EAF2;font-family:'Pretendard',system-ui,sans-serif;display:flex;flex-direction:column;padding:56px 96px 40px;\">\n    <span style=\"display:inline-flex;align-items:center;gap:10px;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.14em;text-transform:uppercase;color:#3FD8C7;margin-bottom:14px;\"><span style=\"width:22px;height:1.5px;background:#3FD8C7;\"><\u002Fspan>02 · RAG 기본 개념<\u002Fspan>\n    <h2 style=\"margin:0 0 28px;font-size:34px;font-weight:700;letter-spacing:-0.015em;color:#F4F6FA;\">“그거 그냥 grep 아니에요?”<\u002Fh2>\n    <div style=\"flex:1;display:grid;grid-template-columns:1fr 1fr;gap:22px;align-items:center;\">\n      <div style=\"background:#131A2A;border:1px solid rgba(255,255,255,0.12);border-radius:12px;padding:24px 26px;box-shadow:0 8px 24px rgba(0,0,0,.45);height:100%;box-sizing:border-box;display:flex;flex-direction:column;gap:10px;\">\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.06em;text-transform:uppercase;color:#9AA6BC;\">grep / rg<\u002Fspan>\n        <p style=\"margin:0;font-size:18px;color:#F4F6FA;font-weight:600;\">문자열 위치를 찾는 도구<\u002Fp>\n        <p style=\"margin:0;font-size:16px;line-height:1.6;color:#C5CDDC;word-break:keep-all;\">“이 identifier가 어디 있지?”에 답함. 찾은 결과를 누가·어떻게 쓸지는 관여하지 않음.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:color-mix(in srgb,#57C98A 7%,#131A2A);border:1px solid rgba(255,255,255,0.12);border-top:3px solid #57C98A;border-radius:12px;padding:24px 26px;box-shadow:0 8px 24px rgba(0,0,0,.45);height:100%;box-sizing:border-box;display:flex;flex-direction:column;gap:10px;\">\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.06em;text-transform:uppercase;color:#57C98A;font-weight:700;\">RAG<\u002Fspan>\n        <p style=\"margin:0;font-size:18px;color:#F4F6FA;font-weight:600;word-break:keep-all;\">찾은 자료를 LLM의 답·판단에 연결하는 전체 구조<\u002Fp>\n        <p style=\"margin:0;font-size:16px;line-height:1.6;color:#C5CDDC;word-break:keep-all;\">grep은 그 안의 retrieval 방식 <b style=\"color:#57C98A;\">하나<\u002Fb>일 수 있음. <span style=\"font-family:'JetBrains Mono',monospace;\">RAG ⊃ grep<\u002Fspan>.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"margin:24px 0 0;text-align:center;font-size:18px;color:#C5CDDC;\">grep은 부품, <b style=\"color:#3FD8C7;\">RAG는 조립된 작업 흐름.<\u002Fb><\u002Fp>\n    <div style=\"display:flex;align-items:center;justify-content:space-between;padding-top:12px;\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:#4A566B;\">LLM Wiki · Camera HAL<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#4A566B;\">07 / 21<\u002Fspan><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 8 — RAG != Vector DB -->\n  <section data-label=\"RAG ≠ Vector DB\" data-speaker-notes=\"두 번째 단골 오해입니다. 'Vector DB 깔았으니 RAG 되는 거 아니야?' → 아닙니다. Vector DB는 책장, RAG는 '책을 꺼내 읽고 답하는 습관 전체'. 책장만 있고 꺼내 보는 단계가 없으면 의미가 없습니다.\" style=\"width:100%;height:100%;box-sizing:border-box;background:#0A0E18;background-image:radial-gradient(circle at 1px 1px, rgba(255,255,255,0.04) 1px, transparent 0);background-size:30px 30px;color:#E6EAF2;font-family:'Pretendard',system-ui,sans-serif;display:flex;flex-direction:column;padding:56px 96px 40px;\">\n    <span style=\"display:inline-flex;align-items:center;gap:10px;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.14em;text-transform:uppercase;color:#3FD8C7;margin-bottom:14px;\"><span style=\"width:22px;height:1.5px;background:#3FD8C7;\"><\u002Fspan>03 · RAG 동작 구조<\u002Fspan>\n    <h2 style=\"margin:0 0 26px;font-size:34px;font-weight:700;letter-spacing:-0.015em;color:#F4F6FA;\">RAG ≠ Vector DB<\u002Fh2>\n    <div style=\"flex:1;display:flex;flex-direction:column;justify-content:center;gap:22px;\">\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:22px;\">\n        <div style=\"background:color-mix(in srgb,#3FD8C7 7%,#131A2A);border:1px solid rgba(255,255,255,0.12);border-left:3px solid #3FD8C7;border-radius:12px;padding:22px 24px;\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.06em;text-transform:uppercase;color:#3FD8C7;font-weight:700;\">RAG<\u002Fspan><p style=\"margin:8px 0 0;font-size:17px;line-height:1.55;color:#E6EAF2;word-break:keep-all;\"><b style=\"color:#fff;\">전체 작업 구조<\u002Fb> — 검색해서 근거로 답하는 흐름 전부.<\u002Fp><\u002Fdiv>\n        <div style=\"background:#131A2A;border:1px solid rgba(255,255,255,0.12);border-radius:12px;padding:22px 24px;\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.06em;text-transform:uppercase;color:#F5B73F;font-weight:700;\">Vector DB<\u002Fspan><p style=\"margin:8px 0 0;font-size:17px;line-height:1.55;color:#E6EAF2;word-break:keep-all;\"><b style=\"color:#fff;\">semantic search용 저장소<\u002Fb> — RAG를 구현하는 검색 방식 중 <b style=\"color:#3FD8C7;\">하나<\u002Fb>.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:13px;margin-top:4px;\">\n        <div style=\"display:flex;gap:12px;align-items:flex-start;\"><span style=\"color:#3FD8C7;font-size:15px;\">▸<\u002Fspan><span style=\"font-size:17px;line-height:1.55;color:#E6EAF2;word-break:keep-all;\">Vector DB가 있다고 <b style=\"color:#fff;\">Claude가 자동으로 검색하지 않는다.<\u002Fb><\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;gap:12px;align-items:flex-start;\"><span style=\"color:#3FD8C7;font-size:15px;\">▸<\u002Fspan><span style=\"font-size:17px;line-height:1.55;color:#E6EAF2;word-break:keep-all;\">Claude가 <b style=\"color:#fff;\">호출할 수 있는 Tool 또는 MCP server<\u002Fb>가 있어야 비로소 검색이 일어난다.<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;justify-content:space-between;padding-top:12px;\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:#4A566B;\">LLM Wiki · Camera HAL<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#4A566B;\">08 / 21<\u002Fspan><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 9 — Vector DB 검색 흐름 (graph) -->\n  <section data-label=\"Vector DB 흐름\" data-speaker-notes=\"화살표 ①~④를 순서대로 짚으세요. ①번이 일어나려면 두 가지가 필요합니다 — 호출 가능한 Tool/MCP가 연결돼 있어야 하고, CLAUDE.md·Skill로 검색 먼저를 유도해야 합니다. 도구 존재 + 호출 규칙 둘 다 있어야 흐름이 시작됩니다.\" style=\"width:100%;height:100%;box-sizing:border-box;background:#0A0E18;background-image:radial-gradient(circle at 1px 1px, rgba(255,255,255,0.04) 1px, transparent 0);background-size:30px 30px;color:#E6EAF2;font-family:'Pretendard',system-ui,sans-serif;display:flex;flex-direction:column;padding:56px 96px 40px;\">\n    <span style=\"display:inline-flex;align-items:center;gap:10px;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.14em;text-transform:uppercase;color:#3FD8C7;margin-bottom:14px;\"><span style=\"width:22px;height:1.5px;background:#3FD8C7;\"><\u002Fspan>03 · RAG 동작 구조 · 도식 ②<\u002Fspan>\n    <h2 style=\"margin:0 0 18px;font-size:34px;font-weight:700;letter-spacing:-0.015em;color:#F4F6FA;\">Vector DB 검색 흐름<\u002Fh2>\n    <div style=\"flex:1;display:flex;flex-direction:column;justify-content:center;gap:20px;\">\n      <x-import component-from-global-scope=\"LLMWikiDesignSystem_3ba8d6.GraphCanvas\" nodes=\"{{ vdbNodes }}\" edges=\"{{ vdbEdges }}\" height=\"340px\" show-grid=\"{{ false }}\" hint-size=\"100%,340px\"><\u002Fx-import>\n      <p style=\"margin:0;font-size:18px;line-height:1.55;color:#C5CDDC;word-break:keep-all;\">핵심은 ①번 — 이 흐름이 시작되려면 <b style=\"color:#3FD8C7;\">호출 가능한 Tool/MCP가 연결<\u002Fb>돼 있고, <b style=\"color:#fff;\">CLAUDE.md·Skill로 “검색 먼저”를 유도<\u002Fb>해야 합니다.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;justify-content:space-between;padding-top:12px;\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:#4A566B;\">LLM Wiki · Camera HAL<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#4A566B;\">09 / 21<\u002Fspan><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 10 — Indexing / Retrieval (two graphs) -->\n  <section data-label=\"두 단계\" data-speaker-notes=\"이 슬라이드는 짧게 — '미리 저장 / 질문 시 검색' 정도로만. Indexing은 미리, Retrieval은 질문마다. 색인이 오래되면 검색 품질도 떨어진다 — 그래서 코드/Wiki를 꾸준히 인덱싱한다, 정도만 덧붙이고 넘어가세요.\" style=\"width:100%;height:100%;box-sizing:border-box;background:#0A0E18;background-image:radial-gradient(circle at 1px 1px, rgba(255,255,255,0.04) 1px, transparent 0);background-size:30px 30px;color:#E6EAF2;font-family:'Pretendard',system-ui,sans-serif;display:flex;flex-direction:column;padding:56px 96px 40px;\">\n    <span style=\"display:inline-flex;align-items:center;gap:10px;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.14em;text-transform:uppercase;color:#3FD8C7;margin-bottom:14px;\"><span style=\"width:22px;height:1.5px;background:#3FD8C7;\"><\u002Fspan>03 · RAG 동작 구조<\u002Fspan>\n    <h2 style=\"margin:0 0 22px;font-size:34px;font-weight:700;letter-spacing:-0.015em;color:#F4F6FA;\">RAG는 두 단계로 돈다<\u002Fh2>\n    <div style=\"flex:1;display:flex;flex-direction:column;justify-content:center;gap:22px;\">\n      <div>\n        <span style=\"display:inline-flex;align-items:center;gap:8px;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.06em;text-transform:uppercase;color:#F5B73F;font-weight:700;margin-bottom:8px;\">① Indexing<span style=\"color:#4A566B;font-weight:400;text-transform:none;letter-spacing:0;\">미리 / 주기적으로<\u002Fspan><\u002Fspan>\n        <x-import component-from-global-scope=\"LLMWikiDesignSystem_3ba8d6.GraphCanvas\" nodes=\"{{ idxNodes }}\" edges=\"{{ idxEdges }}\" height=\"118px\" show-grid=\"{{ false }}\" hint-size=\"100%,118px\"><\u002Fx-import>\n      <\u002Fdiv>\n      <div>\n        <span style=\"display:inline-flex;align-items:center;gap:8px;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.06em;text-transform:uppercase;color:#3FD8C7;font-weight:700;margin-bottom:8px;\">② Retrieval<span style=\"color:#4A566B;font-weight:400;text-transform:none;letter-spacing:0;\">질문이 들어올 때마다<\u002Fspan><\u002Fspan>\n        <x-import component-from-global-scope=\"LLMWikiDesignSystem_3ba8d6.GraphCanvas\" nodes=\"{{ retNodes }}\" edges=\"{{ retEdges }}\" height=\"118px\" show-grid=\"{{ false }}\" hint-size=\"100%,118px\"><\u002Fx-import>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;justify-content:space-between;padding-top:12px;\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:#4A566B;\">LLM Wiki · Camera HAL<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#4A566B;\">10 / 21<\u002Fspan><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 11 — PART 4 INTRO (divider) -->\n  <section data-label=\"Part 4 · 핵심\" data-speaker-notes=\"잠깐 호흡을 끊는 전환 슬라이드입니다. '여기서부터가 실무입니다'라고 명확히 신호를 주세요. 핵심 프레임: Claude는 똑똑하지만 게으를 수 있다. 시키지 않으면 검색을 건너뛰고 바로 답한다. 그래서 절차를 코드처럼 박아넣는다.\" style=\"width:100%;height:100%;box-sizing:border-box;background:#070A12;background-image:radial-gradient(circle at 1px 1px, rgba(255,255,255,0.045) 1px, transparent 0);background-size:32px 32px;color:#E6EAF2;font-family:'Pretendard',system-ui,sans-serif;display:flex;flex-direction:column;justify-content:center;padding:0 96px;\">\n    <span style=\"display:inline-flex;align-items:center;gap:9px;width:fit-content;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.08em;color:#F5B73F;border:1px solid #B8770F;background:rgba(245,183,63,0.06);padding:7px 14px;border-radius:999px;margin-bottom:28px;\"><span style=\"width:7px;height:7px;border-radius:50%;background:#F5B73F;box-shadow:0 0 8px #F5B73F;\"><\u002Fspan>04 · 8분 · 오늘의 핵심<\u002Fspan>\n    <h1 style=\"margin:0;font-size:56px;line-height:1.14;font-weight:800;letter-spacing:-0.02em;color:#F4F6FA;word-break:keep-all;\">Claude는 RAG를<br>자동으로 따르지 않는다<\u002Fh1>\n    <p style=\"margin:22px 0 0;font-size:20px;line-height:1.6;color:#C5CDDC;max-width:620px;word-break:keep-all;\">그래서 우리가 <b style=\"color:#F4F6FA;font-weight:600;\">작업 절차를 “강제”<\u002Fb>해야 합니다.<\u002Fp>\n    <div style=\"display:flex;flex-wrap:wrap;gap:10px;margin-top:26px;\">\n      <span style=\"font-family:'JetBrains Mono',monospace;font-size:13px;background:#182133;border:1px solid rgba(255,255,255,0.12);border-radius:6px;padding:6px 12px;color:#3FD8C7;\">CLAUDE.md<\u002Fspan>\n      <span style=\"font-family:'JetBrains Mono',monospace;font-size:13px;background:#182133;border:1px solid rgba(255,255,255,0.12);border-radius:6px;padding:6px 12px;color:#3FD8C7;\">Skill<\u002Fspan>\n      <span style=\"font-family:'JetBrains Mono',monospace;font-size:13px;background:#182133;border:1px solid rgba(255,255,255,0.12);border-radius:6px;padding:6px 12px;color:#3FD8C7;\">Tool / MCP<\u002Fspan>\n      <span style=\"font-family:'JetBrains Mono',monospace;font-size:13px;background:#182133;border:1px solid rgba(255,255,255,0.12);border-radius:6px;padding:6px 12px;color:#3FD8C7;\">Hook<\u002Fspan>\n      <span style=\"font-family:'JetBrains Mono',monospace;font-size:13px;background:#182133;border:1px solid rgba(255,255,255,0.12);border-radius:6px;padding:6px 12px;color:#3FD8C7;\">Plan mode<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 12 — 5 LEVERS -->\n  <section data-label=\"5개 강제 장치\" data-speaker-notes=\"다섯 개를 '규칙 → 절차 → 기능 → 강제 → 게이트' 순서로 읽으세요. CLAUDE.md·Skill은 하라고 적는 것, Tool은 할 수 있게 하는 것, Hook·Plan mode는 안 하면 못 가게 막는 것. 적는 것만으론 안 지켜지니 Hook/Plan mode 같은 강제 장치가 결국 중요합니다.\" style=\"width:100%;height:100%;box-sizing:border-box;background:#0A0E18;background-image:radial-gradient(circle at 1px 1px, rgba(255,255,255,0.04) 1px, transparent 0);background-size:30px 30px;color:#E6EAF2;font-family:'Pretendard',system-ui,sans-serif;display:flex;flex-direction:column;padding:56px 96px 40px;\">\n    <span style=\"display:inline-flex;align-items:center;gap:10px;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.14em;text-transform:uppercase;color:#3FD8C7;margin-bottom:14px;\"><span style=\"width:22px;height:1.5px;background:#3FD8C7;\"><\u002Fspan>04 · Claude에 적용 · 도식 ③<\u002Fspan>\n    <h2 style=\"margin:0 0 22px;font-size:34px;font-weight:700;letter-spacing:-0.015em;color:#F4F6FA;\">역할 분리 — 5개의 강제 장치<\u002Fh2>\n    <div style=\"flex:1;display:flex;flex-direction:column;justify-content:center;gap:16px;\">\n      <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:16px;\">\n        <x-import component-from-global-scope=\"LLMWikiDesignSystem_3ba8d6.KnowledgeNode\" id=\"CLAUDE.md\" title=\"프로젝트 작업 규칙\" note=\"“코드 수정 전 반드시 검색하라” 같은 상시 규칙을 명문화.\" emphasis=\"edge\" active=\"{{ true }}\" hint-size=\"100%,150px\"><\u002Fx-import>\n        <x-import component-from-global-scope=\"LLMWikiDesignSystem_3ba8d6.KnowledgeNode\" id=\"Skill.md\" title=\"반복 절차\" note=\"RAG-first 워크플로를 재사용 가능한 절차로 패키징.\" emphasis=\"edge\" active=\"{{ true }}\" hint-size=\"100%,150px\"><\u002Fx-import>\n        <x-import component-from-global-scope=\"LLMWikiDesignSystem_3ba8d6.KnowledgeNode\" id=\"Tool / MCP\" title=\"실제 검색 기능\" note=\"rg·symbol·Wiki·Vector 검색을 Claude가 호출 가능하게.\" emphasis=\"node\" active=\"{{ true }}\" hint-size=\"100%,150px\"><\u002Fx-import>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(2,1fr);gap:16px;width:66%;margin:0 auto;\">\n        <x-import component-from-global-scope=\"LLMWikiDesignSystem_3ba8d6.KnowledgeNode\" id=\"Hook\" title=\"절차 위반 차단·경고\" note=\"검색 없이 수정하려 하면 막거나 경고 (자동 게이트).\" emphasis=\"node\" active=\"{{ true }}\" hint-size=\"100%,150px\"><\u002Fx-import>\n        <x-import component-from-global-scope=\"LLMWikiDesignSystem_3ba8d6.KnowledgeNode\" id=\"Plan mode\" title=\"승인 전 수정 방지\" note=\"계획을 먼저 보여주고, 사람이 OK 하기 전엔 코드 안 건드림.\" emphasis=\"edge\" active=\"{{ true }}\" hint-size=\"100%,150px\"><\u002Fx-import>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;justify-content:space-between;padding-top:12px;\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:#4A566B;\">LLM Wiki · Camera HAL<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#4A566B;\">12 / 21<\u002Fspan><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 13 — pipeline graph -->\n  <section data-label=\"강제 파이프라인\" data-speaker-notes=\"앞 슬라이드의 5개가 따로 노는 게 아니라 한 파이프라인으로 엮인다는 걸 보여주는 그림입니다. 표현 주의 — Hook은 사람 승인 여부를 직접 읽는 게 아닙니다. Evidence Map·Plan 파일이 있는지, 위험 파일을 건드리는지 같은 조건을 보고 edit을 막거나 경고합니다.\" style=\"width:100%;height:100%;box-sizing:border-box;background:#0A0E18;background-image:radial-gradient(circle at 1px 1px, rgba(255,255,255,0.04) 1px, transparent 0);background-size:30px 30px;color:#E6EAF2;font-family:'Pretendard',system-ui,sans-serif;display:flex;flex-direction:column;padding:56px 96px 40px;\">\n    <span style=\"display:inline-flex;align-items:center;gap:10px;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.14em;text-transform:uppercase;color:#3FD8C7;margin-bottom:14px;\"><span style=\"width:22px;height:1.5px;background:#3FD8C7;\"><\u002Fspan>04 · Claude에 적용 · 도식 ④<\u002Fspan>\n    <h2 style=\"margin:0 0 16px;font-size:34px;font-weight:700;letter-spacing:-0.015em;color:#F4F6FA;\">강제 장치가 함께 도는 모습<\u002Fh2>\n    <div style=\"flex:1;display:flex;flex-direction:column;justify-content:center;gap:18px;\">\n      <x-import component-from-global-scope=\"LLMWikiDesignSystem_3ba8d6.GraphCanvas\" nodes=\"{{ pipeNodes }}\" edges=\"{{ pipeEdges }}\" height=\"380px\" show-grid=\"{{ false }}\" hint-size=\"100%,380px\"><\u002Fx-import>\n      <p style=\"margin:0;text-align:center;font-size:18px;color:#C5CDDC;\">“믿어서”가 아니라, <b style=\"color:#3FD8C7;\">구조적으로 건너뛸 수 없게<\u002Fb> 만드는 것.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;justify-content:space-between;padding-top:12px;\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:#4A566B;\">LLM Wiki · Camera HAL<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#4A566B;\">13 / 21<\u002Fspan><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 14 — CLAUDE.md 3 rules -->\n  <section data-label=\"CLAUDE.md 규칙\" data-speaker-notes=\"슬라이드엔 핵심 3줄만 띄우고, 실제 CLAUDE.md 전문은 여기서 읽으며 보충하세요. '이거 그대로 복붙해서 쓰셔도 됩니다'라고 하면 호응이 좋습니다. 검색 우선순위: rg/grep → symbol → llm-wiki → issue/log → vector 순.\" style=\"width:100%;height:100%;box-sizing:border-box;background:#0A0E18;background-image:radial-gradient(circle at 1px 1px, rgba(255,255,255,0.04) 1px, transparent 0);background-size:30px 30px;color:#E6EAF2;font-family:'Pretendard',system-ui,sans-serif;display:flex;flex-direction:column;padding:56px 96px 40px;\">\n    <span style=\"display:inline-flex;align-items:center;gap:10px;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.14em;text-transform:uppercase;color:#3FD8C7;margin-bottom:14px;\"><span style=\"width:22px;height:1.5px;background:#3FD8C7;\"><\u002Fspan>04 · Claude에 적용<\u002Fspan>\n    <h2 style=\"margin:0 0 24px;font-size:34px;font-weight:700;letter-spacing:-0.015em;color:#F4F6FA;\">CLAUDE.md에 박는 규칙 — 딱 3줄<\u002Fh2>\n    <div style=\"flex:1;display:grid;grid-template-columns:1.25fr 1fr;gap:34px;align-items:center;\">\n      <div style=\"display:flex;flex-direction:column;gap:18px;\">\n        <div style=\"display:flex;gap:18px;align-items:flex-start;\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:700;color:#1F2A3E;line-height:1;min-width:30px;\">1<\u002Fspan><span style=\"font-size:17px;line-height:1.55;color:#E6EAF2;word-break:keep-all;\"><b style=\"color:#fff;\">수정 전 검색<\u002Fb> — 코드를 고치기 전에 현재 branch 코드와 <span style=\"font-family:'JetBrains Mono',monospace;color:#3FD8C7;font-size:14px;\">llm-wiki<\u002Fspan>를 먼저 검색한다. <span style=\"color:#E5736B;\">검색 없이 수정 금지.<\u002Fspan><\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;gap:18px;align-items:flex-start;\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:700;color:#1F2A3E;line-height:1;min-width:30px;\">2<\u002Fspan><span style=\"font-size:17px;line-height:1.55;color:#E6EAF2;word-break:keep-all;\"><b style=\"color:#fff;\">Evidence Map 먼저<\u002Fb> — 근거가 된 source file · class · function을 <span style=\"color:#57C98A;\">증거 맵<\u002Fspan>으로 먼저 제시한다.<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;gap:18px;align-items:flex-start;\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:24px;font-weight:700;color:#1F2A3E;line-height:1;min-width:30px;\">3<\u002Fspan><span style=\"font-size:17px;line-height:1.55;color:#E6EAF2;word-break:keep-all;\"><b style=\"color:#fff;\">승인 전 수정 금지<\u002Fb> — 계획을 먼저 보여주고, 사람이 OK 하기 전엔 <span style=\"color:#3FD8C7;\">코드를 건드리지 않는다.<\u002Fspan><\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <x-import component-from-global-scope=\"LLMWikiDesignSystem_3ba8d6.CodeBlock\" filename=\"검색 우선순위 (Hybrid)\" lang=\"rule\" show-line-numbers=\"{{ false }}\" lines=\"{{ priorityLines }}\" hint-size=\"100%,230px\"><\u002Fx-import>\n    <\u002Fdiv>\n    <p style=\"margin:18px 0 0;text-align:center;font-family:'JetBrains Mono',monospace;font-size:13px;color:#4A566B;\">※ 전체 규칙·검색 우선순위 예시는 발표자 노트(N) 참고<\u002Fp>\n    <div style=\"display:flex;align-items:center;justify-content:space-between;padding-top:10px;\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:#4A566B;\">LLM Wiki · Camera HAL<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#4A566B;\">14 / 21<\u002Fspan><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 15 — Hybrid RAG (graph) -->\n  <section data-label=\"Hybrid RAG\" data-speaker-notes=\"왜 Hybrid냐 — Vector 검색은 의미는 잡지만 정확한 identifier·최신 코드엔 약합니다. 반대로 rg는 정확하지만 의미를 모릅니다. 각 검색이 잘하는 게 다르니 섞는다. 특히 우리한텐 LLM Wiki와 issue/log 검색이 Vector DB만큼 중요합니다.\" style=\"width:100%;height:100%;box-sizing:border-box;background:#0A0E18;background-image:radial-gradient(circle at 1px 1px, rgba(255,255,255,0.04) 1px, transparent 0);background-size:30px 30px;color:#E6EAF2;font-family:'Pretendard',system-ui,sans-serif;display:flex;flex-direction:column;padding:56px 96px 40px;\">\n    <span style=\"display:inline-flex;align-items:center;gap:10px;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.14em;text-transform:uppercase;color:#3FD8C7;margin-bottom:14px;\"><span style=\"width:22px;height:1.5px;background:#3FD8C7;\"><\u002Fspan>05 · Camera HAL 적용 · 도식 ⑤<\u002Fspan>\n    <h2 style=\"margin:0 0 12px;font-size:34px;font-weight:700;letter-spacing:-0.015em;color:#F4F6FA;\">Camera HAL Hybrid RAG<\u002Fh2>\n    <p style=\"margin:0 0 14px;font-size:18px;line-height:1.55;color:#C5CDDC;max-width:780px;word-break:keep-all;\">Vector DB <b style=\"color:#fff;\">하나만<\u002Fb> 믿으면 안 됩니다. 우리 환경에선 여러 검색을 <b style=\"color:#3FD8C7;\">조합<\u002Fb>하는 게 현실적입니다.<\u002Fp>\n    <div style=\"flex:1;display:flex;flex-direction:column;justify-content:center;\">\n      <x-import component-from-global-scope=\"LLMWikiDesignSystem_3ba8d6.GraphCanvas\" nodes=\"{{ hybridNodes }}\" edges=\"{{ hybridEdges }}\" height=\"360px\" show-grid=\"{{ false }}\" hint-size=\"100%,360px\"><\u002Fx-import>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;justify-content:space-between;padding-top:12px;\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:#4A566B;\">LLM Wiki · Camera HAL<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#4A566B;\">15 / 21<\u002Fspan><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 16 — 예시 A -->\n  <section data-label=\"예시 A\" data-speaker-notes=\"이 슬라이드가 청중이 당장 따라 할 수 있는 부분입니다. 천천히 읽어주세요. 좋은 요청의 3요소: ① 먼저 검색하라 ② 아직 수정하지 마라 ③ 결과를 이런 형식으로 정리하라. 이 세 가지만 붙이면 같은 모델도 전혀 다르게 일합니다.\" style=\"width:100%;height:100%;box-sizing:border-box;background:#0A0E18;background-image:radial-gradient(circle at 1px 1px, rgba(255,255,255,0.04) 1px, transparent 0);background-size:30px 30px;color:#E6EAF2;font-family:'Pretendard',system-ui,sans-serif;display:flex;flex-direction:column;padding:56px 96px 40px;\">\n    <span style=\"display:inline-flex;align-items:center;gap:10px;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.14em;text-transform:uppercase;color:#3FD8C7;margin-bottom:14px;\"><span style=\"width:22px;height:1.5px;background:#3FD8C7;\"><\u002Fspan>05 · Camera HAL 적용 · 예시 A<\u002Fspan>\n    <h2 style=\"margin:0 0 24px;font-size:34px;font-weight:700;letter-spacing:-0.015em;color:#F4F6FA;\">SAT common화 영향 범위 분석<\u002Fh2>\n    <div style=\"flex:1;display:grid;grid-template-columns:0.85fr 1.15fr;gap:22px;align-items:stretch;\">\n      <div style=\"background:color-mix(in srgb,#E5736B 7%,#131A2A);border:1px solid rgba(255,255,255,0.12);border-top:3px solid #E5736B;border-radius:12px;padding:24px 26px;box-shadow:0 8px 24px rgba(0,0,0,.45);display:flex;flex-direction:column;gap:12px;\">\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:0.1em;text-transform:uppercase;color:#E5736B;font-weight:700;\">✗ 나쁜 요청<\u002Fspan>\n        <p style=\"margin:0;font-size:18px;color:#F4F6FA;font-weight:600;\">“SAT common화 해줘.”<\u002Fp>\n        <p style=\"margin:0;font-size:15.5px;line-height:1.6;color:#C5CDDC;word-break:keep-all;\">→ Claude가 코드를 보지도 않고 바로 고치기 시작 → regression 폭탄.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:color-mix(in srgb,#57C98A 7%,#131A2A);border:1px solid rgba(255,255,255,0.12);border-top:3px solid #57C98A;border-radius:12px;padding:24px 26px;box-shadow:0 8px 24px rgba(0,0,0,.45);display:flex;flex-direction:column;gap:12px;\">\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:12px;letter-spacing:0.1em;text-transform:uppercase;color:#57C98A;font-weight:700;\">✓ 좋은 요청<\u002Fspan>\n        <p style=\"margin:0;font-size:15.5px;line-height:1.62;color:#E6EAF2;word-break:keep-all;\">“현재 branch 코드와 llm-wiki를 <b style=\"color:#57C98A;\">먼저 검색<\u002Fb>해서 SAT common화 영향 범위를 분석해줘. <b style=\"color:#57C98A;\">아직 코드는 수정하지 말고<\u002Fb> — Evidence Map · 관련 source file · class/function · common화 가능 로직 · vendor에 남길 로직 · regression 위험 · 검증 시나리오 · 수정 계획을 정리해줘.”<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"margin:22px 0 0;text-align:center;font-size:18px;color:#C5CDDC;\">차이는 <b style=\"color:#3FD8C7;\">“먼저 검색 + 수정 보류 + 산출물 명시”<\u002Fb> 세 가지.<\u002Fp>\n    <div style=\"display:flex;align-items:center;justify-content:space-between;padding-top:12px;\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:#4A566B;\">LLM Wiki · Camera HAL<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#4A566B;\">16 / 21<\u002Fspan><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 17 — 예시 B -->\n  <section data-label=\"예시 B\" data-speaker-notes=\"예시 A가 기능 변경, B는 버그 분석입니다. RAG-first는 둘 다에 적용된다는 걸 보여주세요. 특히 5번 가능성 순으로 정리 + 6번 추가 로그 제안이 핵심입니다. AI에게 단정 짓게 하지 말고, 후보를 깔고 검증 방법을 받는 식으로 쓰는 게 안전합니다.\" style=\"width:100%;height:100%;box-sizing:border-box;background:#0A0E18;background-image:radial-gradient(circle at 1px 1px, rgba(255,255,255,0.04) 1px, transparent 0);background-size:30px 30px;color:#E6EAF2;font-family:'Pretendard',system-ui,sans-serif;display:flex;flex-direction:column;padding:56px 96px 40px;\">\n    <span style=\"display:inline-flex;align-items:center;gap:10px;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.14em;text-transform:uppercase;color:#3FD8C7;margin-bottom:14px;\"><span style=\"width:22px;height:1.5px;background:#3FD8C7;\"><\u002Fspan>05 · Camera HAL 적용 · 예시 B<\u002Fspan>\n    <h2 style=\"margin:0 0 22px;font-size:34px;font-weight:700;letter-spacing:-0.015em;color:#F4F6FA;\">capture delay 로그 분석<\u002Fh2>\n    <div style=\"flex:1;display:flex;flex-direction:column;justify-content:center;gap:20px;\">\n      <x-import component-from-global-scope=\"LLMWikiDesignSystem_3ba8d6.CodeBlock\" filename=\"debug-request.prompt\" lang=\"prompt\" lines=\"{{ exampleBLines }}\" hint-size=\"100%,300px\"><\u002Fx-import>\n      <p style=\"margin:0;font-size:18px;line-height:1.55;color:#C5CDDC;word-break:keep-all;\">디버깅도 똑같습니다 — <b style=\"color:#3FD8C7;\">검색 → 근거 정리 → 가설 → 검증 제안<\u002Fb>, 그 다음에야 수정.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;justify-content:space-between;padding-top:12px;\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:#4A566B;\">LLM Wiki · Camera HAL<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#4A566B;\">17 / 21<\u002Fspan><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 18 — 대표 프롬프트 -->\n  <section data-label=\"대표 프롬프트\" data-speaker-notes=\"대표 프롬프트 하나만 크게 띄웠습니다. 리뷰/디버깅 버전은 골격이 같으니 여기서 말로 덧붙이세요. 리뷰 전용, 디버깅 버전도 동일한 패턴 — 먼저 검색 → 근거 제시 → 수정 보류 → 추측은 추측이라 명시. 사내 위키·스니펫으로 공유하시라고 권하세요.\" style=\"width:100%;height:100%;box-sizing:border-box;background:#0A0E18;background-image:radial-gradient(circle at 1px 1px, rgba(255,255,255,0.04) 1px, transparent 0);background-size:30px 30px;color:#E6EAF2;font-family:'Pretendard',system-ui,sans-serif;display:flex;flex-direction:column;padding:56px 96px 40px;\">\n    <span style=\"display:inline-flex;align-items:center;gap:10px;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.14em;text-transform:uppercase;color:#3FD8C7;margin-bottom:14px;\"><span style=\"width:22px;height:1.5px;background:#3FD8C7;\"><\u002Fspan>05 · Camera HAL 적용<\u002Fspan>\n    <h2 style=\"margin:0 0 20px;font-size:34px;font-weight:700;letter-spacing:-0.015em;color:#F4F6FA;\">바로 쓰는 RAG-first 프롬프트<\u002Fh2>\n    <div style=\"flex:1;display:flex;flex-direction:column;justify-content:center;gap:20px;\">\n      <x-import component-from-global-scope=\"LLMWikiDesignSystem_3ba8d6.CodeBlock\" filename=\"rag-first.prompt\" lang=\"prompt\" show-line-numbers=\"{{ false }}\" lines=\"{{ promptLines }}\" hint-size=\"100%,330px\"><\u002Fx-import>\n      <p style=\"margin:0;text-align:center;font-size:18px;color:#C5CDDC;word-break:keep-all;\">공통 골격: <b style=\"color:#3FD8C7;\">먼저 검색 → 근거 제시 → 수정 보류 → 추측은 추측이라 명시.<\u002Fb><\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;justify-content:space-between;padding-top:12px;\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:#4A566B;\">LLM Wiki · Camera HAL<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#4A566B;\">18 / 21<\u002Fspan><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 19 — 도입 로드맵 -->\n  <section data-label=\"도입 로드맵\" data-speaker-notes=\"리뷰에서 가장 강조된 추가 슬라이드입니다. '그래서 내일부터 뭘 하냐'에 답하는 곳이에요. 핵심: 무거운 인프라(Vector DB)부터 깔지 말고, Step 1(CLAUDE.md + rg + Plan mode)로 오늘 시작하라. 가치의 80%는 Step 1에서 나옵니다.\" style=\"width:100%;height:100%;box-sizing:border-box;background:#0A0E18;background-image:radial-gradient(circle at 1px 1px, rgba(255,255,255,0.04) 1px, transparent 0);background-size:30px 30px;color:#E6EAF2;font-family:'Pretendard',system-ui,sans-serif;display:flex;flex-direction:column;padding:56px 96px 40px;\">\n    <span style=\"display:inline-flex;align-items:center;gap:10px;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.14em;text-transform:uppercase;color:#3FD8C7;margin-bottom:14px;\"><span style=\"width:22px;height:1.5px;background:#3FD8C7;\"><\u002Fspan>05 · Camera HAL 적용 · 실행 로드맵<\u002Fspan>\n    <h2 style=\"margin:0 0 24px;font-size:34px;font-weight:700;letter-spacing:-0.015em;color:#F4F6FA;\">우리 팀은 어떻게 시작할까?<\u002Fh2>\n    <div style=\"flex:1;display:grid;grid-template-columns:repeat(4,1fr);gap:16px;align-items:stretch;\">\n      <div style=\"background:#131A2A;border:1px solid rgba(255,255,255,0.12);border-top:3px solid #3FD8C7;border-radius:12px;padding:20px 20px;display:flex;flex-direction:column;gap:10px;box-shadow:0 8px 24px rgba(0,0,0,.45);\">\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.06em;color:#3FD8C7;font-weight:700;\">STEP 1<\u002Fspan>\n        <p style=\"margin:0;font-size:16px;color:#F4F6FA;font-weight:600;word-break:keep-all;\">grep 기반 RAG-first<\u002Fp>\n        <span style=\"display:inline-flex;width:fit-content;font-family:'JetBrains Mono',monospace;font-size:11px;color:#57C98A;background:color-mix(in srgb,#57C98A 16%,transparent);border-radius:5px;padding:2px 8px;white-space:nowrap;\">내일 바로 가능<\u002Fspan>\n        <p style=\"margin:auto 0 0;font-size:13.5px;line-height:1.55;color:#9AA6BC;word-break:keep-all;\">CLAUDE.md · llm-wiki · rg/git grep · Plan mode<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:#131A2A;border:1px solid rgba(255,255,255,0.12);border-top:3px solid #F5B73F;border-radius:12px;padding:20px 20px;display:flex;flex-direction:column;gap:10px;box-shadow:0 8px 24px rgba(0,0,0,.45);\">\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.06em;color:#F5B73F;font-weight:700;\">STEP 2<\u002Fspan>\n        <p style=\"margin:0;font-size:16px;color:#F4F6FA;font-weight:600;word-break:keep-all;\">Hybrid Search<\u002Fp>\n        <p style=\"margin:auto 0 0;font-size:13.5px;line-height:1.55;color:#9AA6BC;word-break:keep-all;\">symbol search · issue/log search · debug guide<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:#131A2A;border:1px solid rgba(255,255,255,0.12);border-top:3px solid #9AA6BC;border-radius:12px;padding:20px 20px;display:flex;flex-direction:column;gap:10px;box-shadow:0 8px 24px rgba(0,0,0,.45);\">\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.06em;color:#C5CDDC;font-weight:700;\">STEP 3<\u002Fspan>\n        <p style=\"margin:0;font-size:16px;color:#F4F6FA;font-weight:600;word-break:keep-all;\">Vector DB 추가<\u002Fp>\n        <p style=\"margin:auto 0 0;font-size:13.5px;line-height:1.55;color:#9AA6BC;word-break:keep-all;\">llm-wiki / 설계문서 / 이슈 / 로그 분석 기록 indexing<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:#131A2A;border:1px solid rgba(255,255,255,0.12);border-top:3px solid #57C98A;border-radius:12px;padding:20px 20px;display:flex;flex-direction:column;gap:10px;box-shadow:0 8px 24px rgba(0,0,0,.45);\">\n        <span style=\"font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.06em;color:#57C98A;font-weight:700;\">STEP 4<\u002Fspan>\n        <p style=\"margin:0;font-size:16px;color:#F4F6FA;font-weight:600;word-break:keep-all;\">Hook / CI<\u002Fp>\n        <p style=\"margin:auto 0 0;font-size:13.5px;line-height:1.55;color:#9AA6BC;word-break:keep-all;\">Evidence Map 없으면 수정 차단 · 위험 파일 checklist<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"margin:22px 0 0;font-size:18px;line-height:1.55;color:#C5CDDC;word-break:keep-all;\">Vector DB부터 깔 필요 없습니다. <b style=\"color:#3FD8C7;\">별도 Vector DB나 MCP 없이도 Step 1은 오늘 시작<\u002Fb>할 수 있어요.<\u002Fp>\n    <div style=\"display:flex;align-items:center;justify-content:space-between;padding-top:12px;\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:#4A566B;\">LLM Wiki · Camera HAL<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#4A566B;\">19 / 21<\u002Fspan><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 20 — 핵심 5문장 -->\n  <section data-label=\"가져갈 5문장\" data-speaker-notes=\"발표자 본인이 이 5문장은 보지 않고도 말할 수 있어야 합니다. 청중에게도 '이 5개만 가져가시면 됩니다'라고 명시하세요. Q&amp;A 대비: Vector DB 없이도 RAG다 / 검색 안 하면 Hook·Plan mode로 강제 / 코드 전체 넣을 필요 없다 / grep과 vector는 강점이 다르다 / 안전이 아니라 위험을 줄이는 것.\" style=\"width:100%;height:100%;box-sizing:border-box;background:#0A0E18;background-image:radial-gradient(circle at 1px 1px, rgba(255,255,255,0.04) 1px, transparent 0);background-size:30px 30px;color:#E6EAF2;font-family:'Pretendard',system-ui,sans-serif;display:flex;flex-direction:column;padding:56px 96px 40px;\">\n    <span style=\"display:inline-flex;align-items:center;gap:10px;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.14em;text-transform:uppercase;color:#3FD8C7;margin-bottom:14px;\"><span style=\"width:22px;height:1.5px;background:#3FD8C7;\"><\u002Fspan>06 · 결론<\u002Fspan>\n    <h2 style=\"margin:0 0 22px;font-size:34px;font-weight:700;letter-spacing:-0.015em;color:#F4F6FA;\">오늘 가져갈 5문장<\u002Fh2>\n    <div style=\"flex:1;display:flex;flex-direction:column;justify-content:center;gap:15px;\">\n      <div style=\"display:flex;gap:18px;align-items:flex-start;\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;color:#1F2A3E;line-height:1.2;min-width:30px;\">1<\u002Fspan><span style=\"font-size:17.5px;line-height:1.5;color:#E6EAF2;word-break:keep-all;\">RAG는 <b style=\"color:#fff;\">Retrieval-Augmented Generation<\u002Fb>의 약자다.<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;gap:18px;align-items:flex-start;\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;color:#1F2A3E;line-height:1.2;min-width:30px;\">2<\u002Fspan><span style=\"font-size:17.5px;line-height:1.5;color:#E6EAF2;word-break:keep-all;\">RAG는 LLM이 바로 답하지 않고, 관련 코드·문서·이슈·로그를 <b style=\"color:#fff;\">먼저 찾아 그 근거로<\u002Fb> 답하게 만드는 구조다.<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;gap:18px;align-items:flex-start;\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;color:#1F2A3E;line-height:1.2;min-width:30px;\">3<\u002Fspan><span style=\"font-size:17.5px;line-height:1.5;color:#E6EAF2;word-break:keep-all;\">RAG ≠ Vector DB. <b style=\"color:#fff;\">Vector DB는 RAG를 구현하는 검색 방법 중 하나<\u002Fb>일 뿐이다.<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;gap:18px;align-items:flex-start;\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;color:#1F2A3E;line-height:1.2;min-width:30px;\">4<\u002Fspan><span style=\"font-size:17.5px;line-height:1.5;color:#E6EAF2;word-break:keep-all;\">Claude는 RAG를 <b style=\"color:#fff;\">자동으로 항상 따르지 않는다.<\u002Fb> CLAUDE.md·Skill·Tool/MCP·Hook·Plan mode로 절차를 강제해야 한다.<\u002Fspan><\u002Fdiv>\n      <div style=\"display:flex;gap:18px;align-items:flex-start;\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:22px;font-weight:700;color:#1F2A3E;line-height:1.2;min-width:30px;\">5<\u002Fspan><span style=\"font-size:17.5px;line-height:1.5;color:#E6EAF2;word-break:keep-all;\">Camera HAL에선 Vector DB만 믿지 말고 <b style=\"color:#fff;\">rg·symbol·LLM Wiki·issue/log를 섞는 Hybrid RAG<\u002Fb>가 현실적이다.<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;justify-content:space-between;padding-top:12px;\"><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:#4A566B;\">LLM Wiki · Camera HAL<\u002Fspan><span style=\"font-family:'JetBrains Mono',monospace;font-size:11px;color:#4A566B;\">20 / 21<\u002Fspan><\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 21 — 결론 -->\n  <section data-label=\"결론\" data-speaker-notes=\"이 문장은 토씨 하나 바꾸지 말고 그대로 읽으세요. 오늘 발표의 결론입니다. '믿자'가 아니라 '근거 없이 못 하게 만든다' — 잠깐 멈췄다가 Q&amp;A로 넘어가세요.\" style=\"width:100%;height:100%;box-sizing:border-box;background:#070A12;background-image:radial-gradient(circle at 1px 1px, rgba(255,255,255,0.045) 1px, transparent 0);background-size:32px 32px;color:#E6EAF2;font-family:'Pretendard',system-ui,sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:0 96px;\">\n    <span style=\"display:inline-flex;align-items:center;gap:10px;font-family:'JetBrains Mono',monospace;font-size:13px;letter-spacing:0.14em;text-transform:uppercase;color:#3FD8C7;margin-bottom:30px;\"><span style=\"width:22px;height:1.5px;background:#3FD8C7;\"><\u002Fspan>06 · 결론<\u002Fspan>\n    <p style=\"margin:0;font-size:33px;line-height:1.5;font-weight:600;letter-spacing:-0.01em;color:#F4F6FA;max-width:22ch;word-break:keep-all;\">Camera HAL에서 RAG는<br><span style=\"color:#3FD8C7;\">AI를 믿자는 기술이 아닙니다.<\u002Fspan><br><br>AI가 우리 코드와 문서를 확인하지 않고는<br>답변하거나 수정하지 <span style=\"color:#3FD8C7;\">못하게 만드는<\u002Fspan><br>작업 구조입니다.<\u002Fp>\n    <p style=\"margin:38px 0 0;font-family:'JetBrains Mono',monospace;font-size:14px;letter-spacing:0.08em;color:#4A566B;\">— 감사합니다 · Q&amp;A<\u002Fp>\n  <\u002Fsection>\n\n<\u002Fx-import>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  renderVals() {\n    return {\n      exampleBLines: [\n        { text: '[ Claude에게 거는 조건 ]', tone: 'edge' },\n        { text: '', tone: 'plain' },\n        { text: '1. 바로 결론 내리지 말 것  (no jumping to conclusion)', tone: 'warn' },\n        { text: '2. 로그 키워드로 관련 코드 먼저 검색', tone: 'plain' },\n        { text: '3. llm-wiki 의 request / metadata / buffer / fence / thread 확인', tone: 'node' },\n        { text: '4. 과거 유사 이슈 검색', tone: 'node' },\n        { text: '5. 원인 후보를 가능성 순으로 정리', tone: 'ok' },\n        { text: '6. 추가로 찍어야 할 로그 제안', tone: 'node' },\n        { text: '7. 아직 코드는 수정하지 말 것', tone: 'warn' },\n      ],\n      promptLines: [\n        { text: '# 분석 전용 — 영향 범위가 큰 작업에 그대로 거세요', tone: 'comment' },\n        { text: '', tone: 'plain' },\n        { text: '코드는 아직 수정하지 마.', tone: 'warn' },\n        { text: '먼저 현재 branch 코드와 llm-wiki 를 검색해서', tone: 'edge' },\n        { text: 'Evidence Map 을 만들어줘:', tone: 'ok' },\n        { text: '', tone: 'plain' },\n        { text: '  · 관련 source file / class / function', tone: 'plain' },\n        { text: '  · 변경 가능한 로직 / vendor 에 남길 로직', tone: 'plain' },\n        { text: '  · regression 위험 / 검증 시나리오 / 수정 계획', tone: 'plain' },\n        { text: '', tone: 'plain' },\n        { text: '근거가 없는 부분은 \"추측\"이라고 명시해.', tone: 'node' },\n      ],\n      priorityLines: [\n        { text: '1  rg / git grep      # 정확한 identifier', tone: 'edge' },\n        { text: '2  symbol search      # class / function / enum', tone: 'edge' },\n        { text: '3  llm-wiki search    # 프로젝트 맥락', tone: 'node' },\n        { text: '4  issue / log search # 과거 디버깅 기록', tone: 'node' },\n        { text: '5  vector search      # 의미 기반 설명', tone: 'plain' },\n      ],\n      // slide 5 — RAG = R + A + G\n      ragNodes: [\n        { id: 'r', label: 'Retrieval', x: 16, y: 50, emphasis: 'edge', active: true, sub: '검색' },\n        { id: 'a', label: 'Augmented', x: 50, y: 50, emphasis: 'node', active: true, sub: '보강' },\n        { id: 'g', label: 'Generation', x: 84, y: 50, emphasis: 'edge', active: true, sub: '생성' },\n      ],\n      ragEdges: [ { from: 'r', to: 'a' }, { from: 'a', to: 'g' } ],\n\n      // slide 6 — no RAG\n      noRagNodes: [\n        { id: 'q', label: '
